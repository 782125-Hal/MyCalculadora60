
<!-- templates/base.html - Template base corregida con mejoras menores: actualización de Bootstrap a versión estable (5.3.3), agregado de {% load static %} para posibles assets, y navbar básico para navegación consistente en la app (links a home, calculadora, lista_prestamos). Mantiene el diseño simple y en español. -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Préstamos{% endblock %}</title>

    <!-- Bootstrap CSS vía CDN (actualizado a versión estable 5.3.3) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Estilos personalizados -->
    <style>
        body { padding-top: 70px; }  <!-- Ajustado para navbar fixed-top -->
        .container { max-width: 1200px; }  <!-- Aumentado para tablas amplias en detalle/lista -->
    </style>
    {% load static %}  <!-- Agregado para cargar static files si se usan CSS/JS custom -->
</head>
<body>
    <!-- Navbar para navegación consistente -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'prestamos:home' %}">Gestión de Préstamos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'prestamos:calculadora_financiera' %}">Calculadora Financiera</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'prestamos:lista_prestamos' %}">Ver Préstamos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'prestamos:registrar_prestamo' %}">Registrar Préstamo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'prestamos:inversiones' %}">Inversiones</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Mensajes Django -->
        {% if messages %}
            <div class="alert-container mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Contenido principal -->
        <main>
            {% block content %}
            <!-- Aquí se insertan las vistas hijas -->
            {% endblock %}
        </main>

        <!-- Pie de página -->
        <footer class="text-center mt-4">
            <small>&copy; 2025 Tu App de Préstamos</small>
        </footer>
    </div>

    <!-- Bootstrap JS vía CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
