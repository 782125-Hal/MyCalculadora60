{% extends 'base.html' %}

{% block title %}Editar Movimiento{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">Editar Movimiento</h2>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Tipo</label>
                    <p class="form-control-plaintext">{{ movimiento.get_tipo_display }}</p>
                </div>

                <div class="mb-3">
                    <label for="monto" class="form-label fw-bold">Monto</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" step="0.01" min="0.01" name="monto"
                               id="monto" class="form-control"
                               value="{{ movimiento.monto }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="fecha" class="form-label fw-bold">Fecha</label>
                    <input type="date" name="fecha" id="fecha" class="form-control"
                           value="{{ movimiento.fecha|date:'Y-m-d' }}" required>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-bold">Descripción</label>
                    <input type="text" name="descripcion" id="descripcion" class="form-control"
                           value="{{ movimiento.descripcion }}">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <a href="{% url 'prestamos:detalle_prestamo' movimiento.prestamo.id %}"
                       class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
