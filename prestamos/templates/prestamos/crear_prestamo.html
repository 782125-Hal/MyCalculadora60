<!DOCTYPE html>
<html lang="es">
<head>
    <title>Crear Préstamo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Crear Nuevo Préstamo</h1>
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="cliente" class="form-label">Cliente</label>
                <select class="form-control" name="cliente" id="cliente" required>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}">{{ cliente.nombre }}</option>
                    {% endfor %}
                </select>
                <div class="invalid-feedback">Por favor, selecciona un cliente.</div>
            </div>
            <div class="mb-3">
                <label for="monto" class="form-label">Monto</label>
                <input type="number" class="form-control" name="monto" id="monto" step="0.01" required>
                <div class="invalid-feedback">Por favor, ingresa un monto válido.</div>
            </div>
            <div class="mb-3">
                <label for="tipo_pago" class="form-label">Tipo de Pago</label>
                <select class="form-control" name="tipo_pago" id="tipo_pago" required>
                    <option value="mensual">Mensual</option>
                    <option value="semanal">Semanal</option>
                </select>
                <div class="invalid-feedback">Por favor, selecciona un tipo de pago.</div>
            </div>
            <div class="mb-3">
                <label for="fecha_inicio" class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control" name="fecha_inicio" id="fecha_inicio" value="{{ fecha_actual|date:'Y-m-d' }}" required>
                <div class="invalid-feedback">Por favor, selecciona una fecha.</div>
            </div>
            <div class="mb-3">
                <label for="tasa_interes_anual" class="form-label">Tasa de Interés Anual (%)</label>
                <input type="number" class="form-control" name="tasa_interes_anual" id="tasa_interes_anual" step="0.01" required>
                <div class="invalid-feedback">Por favor, ingresa una tasa válida.</div>
            </div>
            <div class="mb-3">
                <label for="periodos_totales" class="form-label">Períodos Totales</label>
                <input type="number" class="form-control" name="periodos_totales" id="periodos_totales" value="36" required>
                <div class="invalid-feedback">Por favor, ingresa el número de períodos.</div>
            </div>
            <button type="submit" class="btn btn-custom">Crear Préstamo</button>
            <a href="{% url 'prestamos:lista_prestamos' %}" class="btn btn-back ms-2">Cancelar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            'use strict';
            const form = document.querySelector('.needs-validation');
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        })();
    </script>
</body>
</html>
