<!DOCTYPE html>
   <html lang="es">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Registrar Pago</title>
       <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
   </head>
   <body class="bg-gray-100 p-6">
       <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
           <h1 class="text-2xl font-bold mb-4">Registrar Pago</h1>

           <!-- Mensajes -->
           {% if messages %}
               {% for message in messages %}
                   <div class="p-2 mb-2 {% if message.tags == 'success' %}bg-green-500{% else %}bg-red-500{% endif %} text-white rounded">
                       {{ message }}
                   </div>
               {% endfor %}
           {% endif %}

           <form method="POST" action="">
               {% csrf_token %}
               <div class="mb-4">
                   <label class="block text-sm font-medium">Monto</label>
                   <input type="number" name="monto" step="0.01" value="" class="w-full border p-2 rounded" required>
               </div>
               <div class="mb-4">
                   <label class="block text-sm font-medium">Fecha</label>
                   <input type="date" name="fecha" value="{{ today|date:'Y-m-d' }}" class="w-full border p-2 rounded" required>
               </div>
               <button type="submit" class="bg-blue-500 text-white p-2 rounded">Registrar Pago</button>
               <a href="{% url 'prestamos:detalle_prestamo' prestamo_id %}" class="bg-gray-500 text-white p-2 rounded ml-2">Cancelar</a>
           </form>
       </div>
   </body>
   </html>
